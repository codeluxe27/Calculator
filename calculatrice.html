<script>
  //////////////////////////////////////////////////////////////////////////

            const calculator_instance = document.getElementById('calculator_instance');
            const ci_width = calculator_instance.offsetWidth;
            const calc_header = document.getElementById('calc_header2');
            calc_header.style.width = ci_width + 'px';
            
            function resize(){
            alert(calculator_instance.offsetWidth)
            }
    var values_displayed = 0;
    var clearE = document.getElementById('clearE');
    var clear = document.getElementById('clear');
    var del = document.getElementById('del');



    const displayer = document.querySelector("#calcexe_result span:nth-child(2)");
    const result2 = document.querySelector("#calcexe_result span:nth-child(1)");

    const carree = document.getElementById('carré');

    carree.addEventListener('click', ()=>{
        values_displayed = displayer.innerHTML
        result2.innerHTML = `sqr(${values_displayed})`
        values_displayed = parseFloat(values_displayed)
        values_displayed **= 2
        values_displayed = String(values_displayed)
        displayer.innerHTML  = values_displayed

    })

    del.addEventListener('click', ()=>{
        if(displayer.innerHTML != "0" && displayer.innerHTML.length > 1){
            displayer.innerHTML = displayer.innerHTML.replace(displayer.innerHTML[displayer.innerHTML.length - 1], '')
            values_displayed = values_displayed.replace(values_displayed[values_displayed.length - 1], "")
        }else{
                displayer.innerHTML = "0"
}
        
})


clear.addEventListener('click', ()=>{
    displayer.innerHTML = '0'
    result2.innerHTML = ''
})

clearE.addEventListener('click', ()=>{
    displayer.innerHTML = '0'
    
})

    // Affichage numérique simple
    
    
    var one , two, three, four, five, six, seven, eight, nine, zero;
    var plus, moins, divisé; fois;
    let equal = document.getElementById('equal');

    plus = document.getElementById('plus');
    moins = document.getElementById('moins');
    divisé = document.getElementById('divisé');
    fois = document.getElementById('fois');
    

    one = document.getElementById('one');
    two = document.getElementById('two');
    three = document.getElementById('three');
    four = document.getElementById('four');
    five = document.getElementById('five');
    eigth = document.getElementById('eight');
    six = document.getElementById('six');
    seven = document.getElementById('seven');
    nine = document.getElementById('nine');
    zero = document.getElementById('zero');
    
    var cleanvar = true;
    const num_list1 = ['one' , 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'zero'];
    const num_list = [one , two, three, four, five, six, seven, eight, nine, zero];

    equal.addEventListener('click',()=>{
        let operationBase = result2.innerHTML + displayer.innerHTML;
        
        let operator;
        for(let el in operationBase){
                
                
                if(operationBase[el] == "x"){
                    operator = ["x", el] 
                }
                if(operationBase[el] == "+"){
                    operator = ["+", el] 
                }
                if(operationBase[el] == "-"){
                    operator = ["-", el] 
                }
                if(operationBase[el] == "/"){
                    operator = ["/", el] 
                }
        }


        if(operationBase.includes('x') || operationBase.includes('-') || operationBase.includes('+') || operationBase.includes('/')){
           
            let part1  =  parseInt(displayer.innerHTML)
            
            let part2 = parseInt(result2.innerHTML.replace(operator[0], ""))  
            let operateResult;

            
            switch(operator[0]){
                case "+":
                    console.log("C'est plus !")
                    operateResult = part2 + part1;
                    break;
                case "x":
                    console.log("C'est fois !")
                    operateResult = part2 * part1;
                    break;
                case "/":
                    console.log("C'est divisé !")
                    operateResult = part2 / part1;
                    break;
                case "-":
                    console.log("C'est moins !")
                    operateResult = part2 - part1;
                    break;
            }

                console.log(operateResult)
                result2.innerHTML = `${part2} ${operator[0]} ${part1} = `
                displayer.innerHTML = operateResult;

            
        }


        
    })


  
  //
    one.addEventListener('click', ()=>{
        add_screen(one, "1")
    })
    two.addEventListener('click', ()=>{
        add_screen(two, "2")
    })
    three.addEventListener('click', ()=>{
        add_screen(three, "3")
    })
    four.addEventListener('click', ()=>{
        add_screen(four, "4")
    })
    five.addEventListener('click', ()=>{
        add_screen(five, "5")
    })
    six.addEventListener('click', ()=>{
        add_screen(six, "6")
    })
    seven.addEventListener('click', ()=>{
        add_screen(seven, "7")
    })
    eigth.addEventListener('click', ()=>{
        add_screen(eigth, "8")
    })
    nine.addEventListener('click', ()=>{
        add_screen(nine, "9")
    })
    zero.addEventListener('click', ()=>{
        add_screen(zero, "0")
    })
    
    
    
    function add_screen(span_clicked_id, value_displayed){
        let span_clicked = document.getElementById(span_clicked_id)
        if(displayer.innerHTML == "0" || cleanvar){
            values_displayed = ""
        values_displayed = values_displayed + value_displayed

            displayer.innerHTML = "";
            displayer.innerHTML = values_displayed
            
            console.log(`
            values_displayed = ${typeof values_displayed}
            value_displayed = ${value_displayed}
            `)

            cleanvar = false;

        }else{
            values_displayed = values_displayed + value_displayed

            displayer.innerHTML = values_displayed
            console.log(`
            values_displayed = ${values_displayed}
            value_displayed = ${value_displayed}
            `)

        }

    }

    function step1_arithm(sign){
    
        result2.innerHTML = displayer.innerHTML + ' ' + sign;
        cleanvar = true;
    }

    plus.addEventListener('click', ()=>{
        step1_arithm('+')
    })

    moins.addEventListener('click', ()=>{
        step1_arithm('-')
    })

    fois.addEventListener('click', ()=>{
        step1_arithm('x')
    })
   
    divisé.addEventListener('click', ()=>{
        step1_arithm('/')
    })



        const carre = document.getElementById("calculator_instance");
        const headcarre = document.getElementById("calc_header");
let offsetX = 0;
let offsetY = 0;
let isDragging = false;

headcarre.addEventListener("mousedown", (e) => {
  isDragging = true;
  offsetX = e.clientX - carre.offsetLeft;
  offsetY = e.clientY - carre.offsetTop;
});

document.addEventListener("mousemove", (e) => {
  if (isDragging) {
    carre.style.position = 'absolute'
    carre.style.left = e.clientX - offsetX + "px";
    carre.style.top = e.clientY - offsetY + "px";

  }
});

document.addEventListener("mouseup", () => {
  isDragging = false;
  

});


</script>
